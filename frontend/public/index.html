        <script>
          if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
              navigator.serviceWorker.register('/service-worker.js').then(function(reg){
                // Check for updates every time the page loads
                if (reg && typeof reg.update === 'function') { try { reg.update(); } catch(e){} }
                if (reg) {
                  reg.addEventListener('updatefound', function(){
                    var nw = reg.installing;
                    if (!nw) return;
                    nw.addEventListener('statechange', function(){
                      if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                        // New worker is ready – ask it to take over
                        try { nw.postMessage({ type: 'SKIP_WAITING' }); } catch(e){}
                      }
                    });
                  });
                }
              }).catch(function(){});
              // When the new SW activates, reload the page exactly once to pick up new CSS/JS
              var reloaded = false;
              navigator.serviceWorker.addEventListener('message', function(event){
                if (event.data && event.data.type === 'SW_UPDATED' && !reloaded) {
                  reloaded = true;
                  window.location.reload();
                }
              });
              navigator.serviceWorker.addEventListener('controllerchange', function(){
                if (reloaded) return;
                reloaded = true;
                window.location.reload();
              });
            });
          }
        </script>
